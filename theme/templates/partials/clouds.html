<div id="cloud-intro"
     class="cloud-intro"
     role="dialog"
     aria-modal="true"
     aria-labelledby="cloud-intro-label"
     aria-busy="true"
     hidden>
  <div class="cloud-intro__sky" aria-hidden="true"></div>
  <div class="cloud-intro__stars" aria-hidden="true"></div>
  <div class="cloud-intro__layer cloud-intro__layer--left" aria-hidden="true">
    <div class="cloud-puff cloud-puff--a"></div>
    <div class="cloud-puff cloud-puff--b"></div>
    <div class="cloud-puff cloud-puff--c"></div>
  </div>
  <div class="cloud-intro__layer cloud-intro__layer--right" aria-hidden="true">
    <div class="cloud-puff cloud-puff--d"></div>
    <div class="cloud-puff cloud-puff--e"></div>
    <div class="cloud-puff cloud-puff--f"></div>
  </div>
  <div class="cloud-intro__sun" aria-hidden="true"></div>
  <div class="cloud-intro__center">
    <p class="cloud-intro__jp" lang="ja">天界</p>
    <p id="cloud-intro-label" class="cloud-intro__label">The clouds part over Heaven…</p>
    <button type="button" class="cloud-intro__skip" id="cloud-skip">
      Skip intro
    </button>
  </div>
</div>
