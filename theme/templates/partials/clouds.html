<div id="cloud-intro"
     class="cloud-intro"
     role="dialog"
     aria-modal="true"
     aria-labelledby="cloud-intro-label"
     aria-busy="true"
     hidden>
  <div class="cloud-intro__sky" aria-hidden="true"></div>
  <div class="cloud-intro__layer cloud-intro__layer--left" aria-hidden="true"></div>
  <div class="cloud-intro__layer cloud-intro__layer--right" aria-hidden="true"></div>
  <div class="cloud-intro__center">
    <p id="cloud-intro-label" class="cloud-intro__label">Clouds parting…</p>
    <button type="button" class="cloud-intro__skip" id="cloud-skip">
      Skip intro
    </button>
  </div>
</div>
