{% extends "base.html" %}

{% block title %}{{ page.title }} · {{ SITENAME }}{% endblock %}

{% block content %}
<main id="main" class="article-page">
  <article class="article-detail">
    <header class="article-detail__header">
      <h1>{{ page.title }}</h1>
    </header>
    <div class="article-detail__body prose">
      {{ page.content }}
    </div>
    <p class="article-detail__back"><a href="{{ SITEURL }}/">← Back to {{ SITENAME }}</a></p>
  </article>
</main>
{% endblock %}
