name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: pelican content -s publishconf.py --fatal errors

      - name: Smoke verify output (phases A–C)
        run: |
          set -euo pipefail
          # Phase A — path / SITEURL / theme CSS
          test -f output/index.html
          grep -q 'https://hblow.github.io/touhou-site' output/index.html
          grep -Eq 'href="[^"]*/theme/css/[^"]+\.css"' output/index.html \
            || grep -Eq "href='[^']*/theme/css/[^']+\\.css'" output/index.html
          # Phase B — disclaimer on landing
          grep -qi 'Team Shanghai Alice\|ZUN\|unofficial fan' output/index.html
          # Phase C — disclaimer on soft multipage articles
          if compgen -G "output/articles/*.html" > /dev/null; then
            for f in output/articles/*.html; do
              grep -qi 'Team Shanghai Alice\|ZUN\|unofficial fan' "$f" \
                || { echo "missing disclaimer in $f"; exit 1; }
            done
          fi
          # Content sanity
          grep -qi 'Top 5 Characters' output/index.html
          test -f output/theme/css/base.css
          test -f output/theme/js/clouds.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
